<!DOCTYPE html>
<html>
<head>
  <title>Elite Card Tracker</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      font-family: Arial;
      background: #111;
      color: white;
      padding: 20px;
    }

    h1, h2 { text-align: center; }

    .tabs {
      text-align: center;
      margin-bottom: 10px;
    }

    .tabs button {
      padding: 10px;
      margin: 5px;
      background: #333;
      color: white;
      border: none;
    }

    .active { background: green !important; }

    .sort-buttons {
      text-align: center;
      margin-bottom: 15px;
    }

    input, button {
      padding: 8px;
      margin: 5px;
      border-radius: 5px;
      border: none;
    }

    table {
      width: 100%;
      margin-top: 20px;
      border-collapse: collapse;
    }

    th, td {
      padding: 8px;
      border-bottom: 1px solid #444;
      text-align: center;
    }

    .profit { color: lightgreen; }
    .loss { color: red; }
  </style>
</head>

<body>

<h1>Elite Card Tracker</h1>

<div class="tabs">
  <button onclick="showTab('deals')" id="dealsTab" class="active">Deals</button>
  <button onclick="showTab('players')" id="playersTab">Players</button>
</div>

<div class="sort-buttons">
  <button onclick="sortDeals('high')">Highest Profit</button>
  <button onclick="sortDeals('low')">Lowest Profit</button>
</div>

<!-- DEALS SCREEN -->
<div id="dealsScreen">

<div>
  <input id="card" placeholder="Card / Player Name">
  <input id="buy" type="number" placeholder="Buy $">
  <input id="sell" type="number" placeholder="Sell $">
  <input id="fees" type="number" placeholder="Fees $">
  <input id="date" type="date">
  <button onclick="addDeal()">Add / Update</button>
</div>

<h2>Sold Cards</h2>
<table>
<thead>
<tr>
<th>Card</th><th>Buy</th><th>Sell</th><th>Profit</th><th>Edit</th><th>Delete</th>
</tr>
</thead>
<tbody id="soldBody"></tbody>
</table>

<h2>Inventory</h2>
<table>
<thead>
<tr>
<th>Card</th><th>Buy</th><th>Sell</th><th>Delete</th>
</tr>
</thead>
<tbody id="inventoryBody"></tbody>
</table>

<h2>Total Profit: $<span id="totalProfit">0</span></h2>

<canvas id="chart"></canvas>

</div>

<!-- PLAYER SCREEN -->
<div id="playersScreen" style="display:none;">
<h2>Player Breakdown</h2>
<table>
<thead>
<tr>
<th>Player</th>
<th>Total Profit</th>
<th># Deals</th>
</tr>
</thead>
<tbody id="playerBody"></tbody>
</table>
</div>

<script>
let deals = JSON.parse(localStorage.getItem("deals")) || [];
let editIndex = -1;
let chart;

function save() {
  localStorage.setItem("deals", JSON.stringify(deals));
}

function showTab(tab) {
  dealsScreen.style.display = tab === "deals" ? "block" : "none";
  playersScreen.style.display = tab === "players" ? "block" : "none";

  dealsTab.classList.toggle("active", tab === "deals");
  playersTab.classList.toggle("active", tab === "players");

  if (tab === "players") renderPlayers();
}

function addDeal() {
  let deal = {
    card: card.value,
    buy: +buy.value || 0,
    sell: +sell.value || 0,
    fees: +fees.value || 0,
    date: date.value,
    sold: sell.value ? true : false
  };

  deal.profit = deal.sell - deal.buy - deal.fees;

  if (editIndex === -1) deals.push(deal);
  else {
    deals[editIndex] = deal;
    editIndex = -1;
  }

  clearInputs();
  save();
  render();
}

function editDeal(i) {
  let d = deals[i];
  card.value = d.card;
  buy.value = d.buy;
  sell.value = d.sell;
  fees.value = d.fees;
  date.value = d.date;
  editIndex = i;
}

function deleteDeal(i) {
  deals.splice(i, 1);
  save();
  render();
}

function markSold(i) {
  let price = prompt("Sell price?");
  if (!price) return;

  deals[i].sell = +price;
  deals[i].sold = true;
  deals[i].profit = deals[i].sell - deals[i].buy - deals[i].fees;

  save();
  render();
}

function clearInputs() {
  card.value = buy.value = sell.value = fees.value = date.value = "";
}

function sortDeals(type) {
  deals.sort((a, b) => {
    return type === "high" ? b.profit - a.profit : a.profit - b.profit;
  });
  save();
  render();
}

function render() {
  soldBody.innerHTML = "";
  inventoryBody.innerHTML = "";

  let total = 0;
  let monthly = {};

  deals.forEach((d,i) => {

    if (d.sold) {
      total += d.profit;

      if (d.date) {
        let m = d.date.slice(0,7);
        monthly[m] = (monthly[m] || 0) + d.profit;
      }

      soldBody.innerHTML += `
        <tr>
          <td>${d.card}</td>
          <td>$${d.buy}</td>
          <td>$${d.sell}</td>
          <td class="${d.profit>=0?'profit':'loss'}">$${d.profit.toFixed(2)}</td>
          <td><button onclick="editDeal(${i})">Edit</button></td>
          <td><button onclick="deleteDeal(${i})">X</button></td>
        </tr>`;
    } else {
      inventoryBody.innerHTML += `
        <tr>
          <td>${d.card}</td>
          <td>$${d.buy}</td>
          <td><button onclick="markSold(${i})">Sell</button></td>
          <td><button onclick="deleteDeal(${i})">X</button></td>
        </tr>`;
    }

  });

  totalProfit.innerText = total.toFixed(2);
  drawChart(monthly);
}

function renderPlayers() {
  playerBody.innerHTML = "";

  let map = {};

  deals.forEach(d => {
    if (!map[d.card]) {
      map[d.card] = { profit:0, count:0 };
    }
    map[d.card].profit += d.profit;
    map[d.card].count++;
  });

  let arr = Object.entries(map);
  arr.sort((a,b)=> b[1].profit - a[1].profit);

  arr.forEach(([p,data])=>{
    playerBody.innerHTML += `
      <tr>
        <td>${p}</td>
        <td>$${data.profit.toFixed(2)}</td>
        <td>${data.count}</td>
      </tr>`;
  });
}

function drawChart(monthly) {
  let labels = Object.keys(monthly);
  let data = Object.values(monthly);

  if (chart) chart.destroy();

  chart = new Chart(document.getElementById("chart"), {
    type: "line",
    data: {
      labels: labels,
      datasets: [{ label:"Profit", data }]
    }
  });
}

// shortcuts
const card = document.getElementById("card");
const buy = document.getElementById("buy");
const sell = document.getElementById("sell");
const fees = document.getElementById("fees");
const date = document.getElementById("date");
const soldBody = document.getElementById("soldBody");
const inventoryBody = document.getElementById("inventoryBody");
const totalProfit = document.getElementById("totalProfit");

render();
</script>

</body>
</html>
