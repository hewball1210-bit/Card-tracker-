<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Elite Card Tracker</title>

<style>
body {
  background: #0b0b0b;
  color: white;
  font-family: Arial;
  text-align: center;
}

input, select {
  display: block;
  margin: 10px auto;
  padding: 10px;
  border-radius: 10px;
  border: none;
  width: 250px;
}

button {
  padding: 10px 15px;
  border-radius: 10px;
  border: none;
  margin: 5px;
}

.green { background: green; color: white; }
.gray { background: #333; color: white; }

table {
  width: 95%;
  margin: 20px auto;
  border-collapse: collapse;
}

th, td {
  padding: 10px;
  border-bottom: 1px solid #444;
}

.player-card {
  background: #111;
  margin: 10px auto;
  padding: 15px;
  border-radius: 10px;
  width: 80%;
}
</style>
</head>

<body>

<h1>Elite Card Tracker</h1>

<button class="green" onclick="showDeals()">Deals</button>
<button class="gray" onclick="showPlayers()">Players</button>

<!-- ================= DEALS SCREEN ================= -->
<div id="dealsScreen">

<button onclick="sortHigh()">Highest Profit</button>
<button onclick="sortLow()">Lowest Profit</button>

<select id="filterMethod" onchange="displayDeals()">
  <option value="all">All Methods</option>
  <option>Cash</option>
  <option>Venmo</option>
  <option>eBay</option>
  <option>Topps</option>
</select>

<input id="name" placeholder="Card / Player Name">
<input id="buy" placeholder="Buy $" type="number">
<input id="sell" placeholder="Sell $" type="number">
<input id="fees" placeholder="Fees $" type="number">
<input id="date" type="date">

<select id="method">
  <option value="">Select Payment Method</option>
  <option>Cash</option>
  <option>Venmo</option>
  <option>eBay</option>
  <option>Topps</option>
</select>

<button onclick="addCard()">Add / Update</button>

<h2>Sold Cards</h2>

<table>
<thead>
<tr>
<th>Card</th>
<th>Buy</th>
<th>Sell</th>
<th>Profit</th>
<th>Date</th>
<th>Method</th>
<th>Edit</th>
<th>Delete</th>
</tr>
</thead>
<tbody id="soldTable"></tbody>
</table>

<h2>Inventory</h2>

<table>
<thead>
<tr>
<th>Card</th>
<th>Buy</th>
<th>Sell</th>
<th>Date</th>
<th>Method</th>
<th>Delete</th>
</tr>
</thead>
<tbody id="inventoryTable"></tbody>
</table>

<h2 id="totalProfit">Total Profit: $0</h2>

</div>

<!-- ================= PLAYERS SCREEN ================= -->
<div id="playersScreen" style="display:none;">
  <h2>Players</h2>
  <div id="playersContainer"></div>
</div>

<script>
let sold = JSON.parse(localStorage.getItem("sold")) || [];
let inventory = JSON.parse(localStorage.getItem("inventory")) || [];

document.getElementById("date").valueAsDate = new Date();

// SWITCH SCREENS
function showDeals() {
  document.getElementById("dealsScreen").style.display = "block";
  document.getElementById("playersScreen").style.display = "none";
}

function showPlayers() {
  document.getElementById("dealsScreen").style.display = "none";
  document.getElementById("playersScreen").style.display = "block";
  displayPlayers();
}

// ADD CARD
function addCard() {
  const name = document.getElementById("name").value;
  const buy = parseFloat(document.getElementById("buy").value);
  const sell = parseFloat(document.getElementById("sell").value);
  const fees = parseFloat(document.getElementById("fees").value) || 0;
  const date = document.getElementById("date").value;
  const method = document.getElementById("method").value;

  if (!name || isNaN(buy)) {
    alert("Fill required fields");
    return;
  }

  const profit = sell ? (sell - buy - fees) : 0;

  const card = { name, buy, sell, fees, profit, date, method };

  if (sell) sold.push(card);
  else inventory.push(card);

  localStorage.setItem("sold", JSON.stringify(sold));
  localStorage.setItem("inventory", JSON.stringify(inventory));

  clearInputs();
  displayDeals();
}

// DEALS DISPLAY
function displayDeals() {
  const soldTable = document.getElementById("soldTable");
  const inventoryTable = document.getElementById("inventoryTable");
  const filter = document.getElementById("filterMethod").value;

  soldTable.innerHTML = "";
  inventoryTable.innerHTML = "";

  let total = 0;

  sold
    .map((c,i)=>({...c,index:i}))
    .filter(c=>filter==="all"||c.method===filter)
    .forEach(card=>{
      total += card.profit;

      soldTable.innerHTML += `
      <tr>
        <td>${card.name}</td>
        <td>$${card.buy}</td>
        <td>$${card.sell}</td>
        <td>$${card.profit}</td>
        <td>${card.date||"-"}</td>
        <td>${card.method||"-"}</td>
        <td><button onclick="editCard(${card.index})">Edit</button></td>
        <td><button onclick="deleteSold(${card.index})">Delete</button></td>
      </tr>`;
    });

  inventory
    .map((c,i)=>({...c,index:i}))
    .filter(c=>filter==="all"||c.method===filter)
    .forEach(card=>{
      inventoryTable.innerHTML += `
      <tr>
        <td>${card.name}</td>
        <td>$${card.buy}</td>
        <td>-</td>
        <td>${card.date||"-"}</td>
        <td>${card.method||"-"}</td>
        <td><button onclick="deleteInventory(${card.index})">Delete</button></td>
      </tr>`;
    });

  document.getElementById("totalProfit").innerText =
    "Total Profit: $" + total.toFixed(2);
}

// PLAYERS DISPLAY
function displayPlayers() {
  const container = document.getElementById("playersContainer");
  container.innerHTML = "";

  const grouped = {};

  sold.forEach(card => {
    const player = card.name.split(" ")[0];

    if (!grouped[player]) {
      grouped[player] = { profit: 0, count: 0 };
    }

    grouped[player].profit += card.profit;
    grouped[player].count++;
  });

  Object.keys(grouped)
    .sort((a,b)=>grouped[b].profit-grouped[a].profit)
    .forEach(player=>{
      container.innerHTML += `
        <div class="player-card">
          <h3>${player}</h3>
          <p>Total Profit: $${grouped[player].profit.toFixed(2)}</p>
          <p>Deals: ${grouped[player].count}</p>
        </div>`;
    });
}

// OTHER FUNCTIONS
function deleteSold(i){ sold.splice(i,1); localStorage.setItem("sold",JSON.stringify(sold)); displayDeals(); }
function deleteInventory(i){ inventory.splice(i,1); localStorage.setItem("inventory",JSON.stringify(inventory)); displayDeals(); }

function editCard(i){
  const c=sold[i];
  name.value=c.name; buy.value=c.buy; sell.value=c.sell;
  fees.value=c.fees; date.value=c.date; method.value=c.method;
  deleteSold(i);
}

function sortHigh(){ sold.sort((a,b)=>b.profit-a.profit); displayDeals(); }
function sortLow(){ sold.sort((a,b)=>a.profit-b.profit); displayDeals(); }

function clearInputs(){
  name.value=""; buy.value=""; sell.value=""; fees.value="";
  date.valueAsDate=new Date(); method.value="";
}

displayDeals();
</script>

</body>
</html>
